<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reservation Confirmed</title></head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#fff; padding:30px; border-radius:8px;">
    <h2 style="color:#2c3e50;">Reservation Confirmed!</h2>
    <p>Dear <strong th:text="${guestName}">Guest</strong>,</p>
    <p>Your reservation has been confirmed.</p>
    <p><strong>Reservation ID:</strong> <span th:text="${reservationId}">ID</span></p>
    <p>Thank you for choosing Stay Aura. We look forward to welcoming you!</p>
    <hr/>
    <p style="font-size:12px; color:#888;">Stay Aura Hotel Management System</p>
  </div>
</body>
</html>
